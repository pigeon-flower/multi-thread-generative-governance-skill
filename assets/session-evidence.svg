<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <rect width="1280" height="560" fill="#111827"/>
  <text x="60" y="72" fill="#fff" font-family="Segoe UI, Arial" font-size="42" font-weight="800">True Threads Require Evidence</text>
  <text x="62" y="112" fill="#a9b8c9" font-family="Segoe UI, Arial" font-size="20">A role is not an independent thread until it has its own Codex session and recorded context boundary.</text>
  <g font-family="Segoe UI, Arial">
    <rect x="82" y="180" width="240" height="250" rx="22" fill="#15243a" stroke="#44d7c8" stroke-width="3"/>
    <text x="126" y="230" fill="#44d7c8" font-size="26" font-weight="800">Red-1</text>
    <text x="112" y="272" fill="#dbe7f3" font-size="18">session id</text><text x="112" y="304" fill="#dbe7f3" font-size="18">allowed files</text><text x="112" y="336" fill="#dbe7f3" font-size="18">forbidden inputs</text>
    <rect x="382" y="180" width="240" height="250" rx="22" fill="#15243a" stroke="#ffcf5a" stroke-width="3"/>
    <text x="424" y="230" fill="#ffcf5a" font-size="26" font-weight="800">Blue-1</text>
    <text x="412" y="272" fill="#dbe7f3" font-size="18">separate context</text><text x="412" y="304" fill="#dbe7f3" font-size="18">minimal prompt</text><text x="412" y="336" fill="#dbe7f3" font-size="18">own outbox</text>
    <rect x="682" y="180" width="240" height="250" rx="22" fill="#15243a" stroke="#ff758d" stroke-width="3"/>
    <text x="720" y="230" fill="#ff758d" font-size="26" font-weight="800">Judge-1</text>
    <text x="712" y="272" fill="#dbe7f3" font-size="18">allowed scope</text><text x="712" y="304" fill="#dbe7f3" font-size="18">blocked scope</text><text x="712" y="336" fill="#dbe7f3" font-size="18">decision record</text>
    <rect x="982" y="180" width="220" height="250" rx="22" fill="#1d2e45" stroke="#8fa2ff" stroke-width="3"/>
    <text x="1016" y="230" fill="#b9c5ff" font-size="26" font-weight="800">Audit</text>
    <text x="1012" y="272" fill="#dbe7f3" font-size="18">what passed</text><text x="1012" y="304" fill="#dbe7f3" font-size="18">what failed</text><text x="1012" y="336" fill="#dbe7f3" font-size="18">cannot claim</text>
    <path d="M322 305 H382 M622 305 H682 M922 305 H982" stroke="#d7f7ff" stroke-width="4" stroke-dasharray="10 10"/>
  </g>
</svg>
