<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600">
  <rect width="1280" height="600" fill="#0f1724"/>
  <text x="60" y="76" fill="#fff" font-family="Microsoft YaHei, Segoe UI, Arial" font-size="44" font-weight="800">Governance Loop</text>
  <text x="62" y="118" fill="#dbe7f3" font-family="Microsoft YaHei, Segoe UI, Arial" font-size="22">Each round narrows scope, separates cognition, executes after judgment, then validates claims.</text>
  <path d="M190 305 C270 162 455 145 555 240" fill="none" stroke="#44d7c8" stroke-width="5"/><path d="M670 240 C780 132 955 170 1030 305" fill="none" stroke="#ffce57" stroke-width="5"/><path d="M1030 375 C950 515 750 522 640 422" fill="none" stroke="#ff758d" stroke-width="5"/><path d="M520 420 C405 518 250 480 190 375" fill="none" stroke="#8fa2ff" stroke-width="5"/>
  <g font-family="Microsoft YaHei, Segoe UI, Arial" font-size="18" font-weight="700" fill="#14253d" stroke="#d7f7ff" stroke-opacity=".36"><rect x="80" y="250" width="220" height="100" rx="18"/><text x="122" y="288" fill="#fff">Task Contract</text><text x="122" y="320" fill="#9fb3c8" font-size="15">goal/scope/done</text><rect x="405" y="180" width="220" height="100" rx="18"/><text x="447" y="218" fill="#fff">Red Review</text><text x="447" y="250" fill="#9fb3c8" font-size="15">failure modes</text><rect x="660" y="180" width="220" height="100" rx="18"/><text x="702" y="218" fill="#fff">Blue Review</text><text x="702" y="250" fill="#9fb3c8" font-size="15">verify and rank</text><rect x="980" y="250" width="220" height="100" rx="18"/><text x="1022" y="288" fill="#fff">Judge</text><text x="1022" y="320" fill="#9fb3c8" font-size="15">allow or defer</text><rect x="660" y="395" width="220" height="100" rx="18"/><text x="702" y="433" fill="#fff">Execute</text><text x="702" y="465" fill="#9fb3c8" font-size="15">controlled writes</text><rect x="405" y="395" width="220" height="100" rx="18"/><text x="447" y="433" fill="#fff">Validate</text><text x="447" y="465" fill="#9fb3c8" font-size="15">claim levels</text></g>
</svg>
