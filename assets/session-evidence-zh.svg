<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600">
  <rect width="1280" height="600" fill="#111827"/><text x="60" y="76" fill="#fff" font-family="Microsoft YaHei, Segoe UI, Arial" font-size="44" font-weight="800">真实线程必须有证据</text><text x="62" y="118" fill="#dbe7f3" font-family="Microsoft YaHei, Segoe UI, Arial" font-size="22">一个角色只有拥有独立 Codex session 和上下文边界记录，才算真正的 thread。</text><g font-family="Microsoft YaHei, Segoe UI, Arial"><rect x="82" y="205" width="240" height="260" rx="22" fill="#15243a" stroke="#44d7c8" stroke-width="3"/><text x="118" y="260" fill="#44d7c8" font-size="27" font-weight="800">红队-1</text><text x="118" y="330" fill="#dbe7f3" font-size="18">session id</text><text x="118" y="366" fill="#dbe7f3" font-size="18">允许文件</text><text x="118" y="402" fill="#dbe7f3" font-size="18">禁止输入</text><rect x="382" y="205" width="240" height="260" rx="22" fill="#15243a" stroke="#ffcf5a" stroke-width="3"/><text x="418" y="260" fill="#ffcf5a" font-size="27" font-weight="800">蓝队-1</text><text x="418" y="330" fill="#dbe7f3" font-size="18">独立上下文</text><text x="418" y="366" fill="#dbe7f3" font-size="18">最小输入包</text><text x="418" y="402" fill="#dbe7f3" font-size="18">独立 outbox</text><rect x="682" y="205" width="240" height="260" rx="22" fill="#15243a" stroke="#ff758d" stroke-width="3"/><text x="718" y="260" fill="#ff758d" font-size="27" font-weight="800">裁判-1</text><text x="718" y="330" fill="#dbe7f3" font-size="18">允许范围</text><text x="718" y="366" fill="#dbe7f3" font-size="18">禁止范围</text><text x="718" y="402" fill="#dbe7f3" font-size="18">决策记录</text><rect x="982" y="205" width="220" height="260" rx="22" fill="#15243a" stroke="#8fa2ff" stroke-width="3"/><text x="1018" y="260" fill="#8fa2ff" font-size="27" font-weight="800">审计</text><text x="1018" y="330" fill="#dbe7f3" font-size="18">已验证</text><text x="1018" y="366" fill="#dbe7f3" font-size="18">失败项</text><text x="1018" y="402" fill="#dbe7f3" font-size="18">不能宣称</text></g>
</svg>
