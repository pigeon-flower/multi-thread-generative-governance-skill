<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600">
  <rect width="1280" height="600" fill="#0e1522"/><text x="62" y="78" fill="#fff" font-family="Microsoft YaHei, Segoe UI, Arial" font-size="44" font-weight="800">验证不是一句“通过”</text><text x="64" y="120" fill="#dbe7f3" font-family="Microsoft YaHei, Segoe UI, Arial" font-size="22">MAGG 把结构检查、规则检查、使用路径和真实目标达成拆开报告。</text><g font-family="Microsoft YaHei, Segoe UI, Arial" font-weight="800"><rect x="120" y="420" width="210" height="70" rx="14" fill="#1a2a40"/><text x="154" y="464" fill="#9fb3c8" font-size="28">L0 结构</text><rect x="360" y="350" width="210" height="140" rx="14" fill="#1a2a40"/><text x="394" y="394" fill="#44d7c8" font-size="28">L1 规则</text><rect x="600" y="265" width="210" height="225" rx="14" fill="#1a2a40"/><text x="634" y="309" fill="#ffcf5a" font-size="28">L2 路径</text><rect x="840" y="170" width="260" height="320" rx="14" fill="#1a2a40"/><text x="874" y="214" fill="#ff758d" font-size="28">L3 结果</text></g><path d="M135 380 H1070" stroke="#dde9f5" stroke-width="2" opacity=".28"/><text x="122" y="535" fill="#c8d6e4" font-family="Microsoft YaHei, Segoe UI, Arial" font-size="19">每份报告都区分：已验证、失败、未验证、环境缺口、不能宣称。</text>
</svg>
