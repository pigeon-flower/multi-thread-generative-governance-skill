<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600">
  <rect width="1280" height="600" fill="#0f1724"/>
  <text x="60" y="76" fill="#fff" font-family="Microsoft YaHei, Segoe UI, Arial" font-size="44" font-weight="800">治理闭环</text>
  <text x="62" y="118" fill="#dbe7f3" font-family="Microsoft YaHei, Segoe UI, Arial" font-size="22">每一轮先收窄范围、再分离认知、经裁判允许后执行，最后分层验证。</text>
  <path d="M190 305 C270 162 455 145 555 240" fill="none" stroke="#44d7c8" stroke-width="5"/><path d="M670 240 C780 132 955 170 1030 305" fill="none" stroke="#ffce57" stroke-width="5"/><path d="M1030 375 C950 515 750 522 640 422" fill="none" stroke="#ff758d" stroke-width="5"/><path d="M520 420 C405 518 250 480 190 375" fill="none" stroke="#8fa2ff" stroke-width="5"/>
  <g font-family="Microsoft YaHei, Segoe UI, Arial" font-size="18" font-weight="700" fill="#14253d" stroke="#d7f7ff" stroke-opacity=".36"><rect x="80" y="250" width="220" height="100" rx="18"/><text x="122" y="288" fill="#fff">任务契约</text><text x="122" y="320" fill="#9fb3c8" font-size="15">目标/范围/完成</text><rect x="405" y="180" width="220" height="100" rx="18"/><text x="447" y="218" fill="#fff">红队审查</text><text x="447" y="250" fill="#9fb3c8" font-size="15">只找风险</text><rect x="660" y="180" width="220" height="100" rx="18"/><text x="702" y="218" fill="#fff">蓝队回应</text><text x="702" y="250" fill="#9fb3c8" font-size="15">过滤排序</text><rect x="980" y="250" width="220" height="100" rx="18"/><text x="1022" y="288" fill="#fff">裁判</text><text x="1022" y="320" fill="#9fb3c8" font-size="15">允许或延期</text><rect x="660" y="395" width="220" height="100" rx="18"/><text x="702" y="433" fill="#fff">执行</text><text x="702" y="465" fill="#9fb3c8" font-size="15">受控写入</text><rect x="405" y="395" width="220" height="100" rx="18"/><text x="447" y="433" fill="#fff">验证</text><text x="447" y="465" fill="#9fb3c8" font-size="15">分层报告</text></g>
</svg>
