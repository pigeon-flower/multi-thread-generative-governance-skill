<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <rect width="1280" height="560" fill="#0f1724"/>
  <text x="60" y="70" fill="#fff" font-family="Segoe UI, Arial" font-size="42" font-weight="800">Governance Loop</text>
  <text x="62" y="108" fill="#9fb3c8" font-family="Segoe UI, Arial" font-size="20">Each round narrows scope, separates cognition, executes only after judgment, then validates claims.</text>
  <g font-family="Segoe UI, Arial" font-size="18" font-weight="700">
    <path d="M190 270 C270 135 455 120 555 210" fill="none" stroke="#44d7c8" stroke-width="5"/>
    <path d="M670 210 C780 110 955 145 1030 270" fill="none" stroke="#ffce57" stroke-width="5"/>
    <path d="M1030 340 C950 480 750 492 640 392" fill="none" stroke="#ff758d" stroke-width="5"/>
    <path d="M520 390 C405 486 250 446 190 340" fill="none" stroke="#8fa2ff" stroke-width="5"/>
    <g fill="#14253d" stroke="#d7f7ff" stroke-opacity=".36">
      <rect x="80" y="220" width="220" height="92" rx="18"/><text x="125" y="258" fill="#fff">Task Contract</text><text x="128" y="288" fill="#9fb3c8" font-size="15">goal, scope, done</text>
      <rect x="405" y="150" width="220" height="92" rx="18"/><text x="468" y="188" fill="#fff">Red Review</text><text x="443" y="218" fill="#9fb3c8" font-size="15">failure modes only</text>
      <rect x="660" y="150" width="220" height="92" rx="18"/><text x="720" y="188" fill="#fff">Blue Review</text><text x="700" y="218" fill="#9fb3c8" font-size="15">verify, rank, refute</text>
      <rect x="980" y="220" width="220" height="92" rx="18"/><text x="1030" y="258" fill="#fff">Judge</text><text x="1014" y="288" fill="#9fb3c8" font-size="15">allow or defer</text>
      <rect x="660" y="365" width="220" height="92" rx="18"/><text x="718" y="403" fill="#fff">Execute</text><text x="697" y="433" fill="#9fb3c8" font-size="15">controlled writes</text>
      <rect x="405" y="365" width="220" height="92" rx="18"/><text x="460" y="403" fill="#fff">Validate</text><text x="435" y="433" fill="#9fb3c8" font-size="15">claim levels split</text>
    </g>
  </g>
</svg>
