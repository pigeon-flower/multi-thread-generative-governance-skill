  <rect width="1280" height="600" fill="#0e1522"/><text x="62" y="78" fill="#fff" font-family="Microsoft YaHei, Segoe UI, Arial" font-size="44" font-weight="800">Validation Is Not One Word</text><text x="64" y="120" fill="#dbe7f3" font-family="Microsoft YaHei, Segoe UI, Arial" font-size="22">MAGG separates structural checks from real user-goal proof.</text><g font-family="Microsoft YaHei, Segoe UI, Arial" font-weight="800"><rect x="120" y="420" width="210" height="70" rx="14" fill="#1a2a40"/><text x="154" y="464" fill="#9fb3c8" font-size="28">L0 Static</text><rect x="360" y="350" width="210" height="140" rx="14" fill="#1a2a40"/><text x="394" y="394" fill="#44d7c8" font-size="28">L1 Rules</text><rect x="600" y="265" width="210" height="225" rx="14" fill="#1a2a40"/><text x="634" y="309" fill="#ffcf5a" font-size="28">L2 Use Path</text><rect x="840" y="170" width="260" height="320" rx="14" fill="#1a2a40"/><text x="874" y="214" fill="#ff758d" font-size="28">L3 Outcome</text></g><path d="M135 380 H1070" stroke="#dde9f5" stroke-width="2" opacity=".28"/><text x="122" y="535" fill="#c8d6e4" font-family="Microsoft YaHei, Segoe UI, Arial" font-size="19">Every report separates verified, failed, not verified, environment gaps, and cannot claim.</text>
